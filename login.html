<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Side | Leader Botz Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #a855f7;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.15);
        }

        /* Fullscreen Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mobile scroll bar-ai thavirkka */
            background: #020617;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- LIVE DYNAMIC GLASS BACKGROUND --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: linear-gradient(45deg, #020617, #0f172a);
        }

        .glass-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float linear infinite;
            opacity: 0.5;
        }

        .orb-1 { width: 300px; height: 300px; background: #6366f1; top: -50px; left: -50px; animation-duration: 15s; }
        .orb-2 { width: 250px; height: 250px; background: #a855f7; bottom: 10%; right: -50px; animation-duration: 20s; animation-direction: reverse; }
        .orb-3 { width: 200px; height: 200px; background: #0ea5e9; bottom: -50px; left: 20%; animation-duration: 18s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, 50px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* --- MOBILE RESPONSIVE CARD --- */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
            z-index: 10;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            color: white;
            animation: cardFadeIn 0.8s ease;
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 26px; margin-bottom: 5px; font-weight: 700; }
        p.subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: 500; }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            -webkit-appearance: none; /* Mobile shadow fix */
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        .pass-wrapper { position: relative; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b; font-size: 18px; }

        button {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-weight: 600; font-size: 16px; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
            box-shadow: 0 10px 15px rgba(168, 85, 247, 0.2);
        }

        .toggle-link { margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .toggle-link span { color: var(--primary); cursor: pointer; font-weight: 700; }

        /* --- FULL SCREEN POPUP LOADER --- */
        #loaderPop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(168, 85, 247, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loaderTxt { margin-top: 20px; color: white; font-size: 18px; font-weight: 500; }

        #msg { padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="glass-orb orb-1"></div>
        <div class="glass-orb orb-2"></div>
        <div class="glass-orb orb-3"></div>
    </div>

    <div id="loaderPop">
        <div class="spinner"></div>
        <p id="loaderTxt">Processing...</p>
    </div>

    <div class="auth-card">
        <h2 id="title">Sign In</h2>
        <p class="subtitle" id="subtitle">Access your account securely with Leader Botz</p>
        
        <div id="msg"></div>

        <form id="mainForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@mail.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <i class="fa-solid fa-eye eye-btn" id="eye"></i>
                </div>
            </div>
            <button type="submit" id="btn">Login</button>
        </form>

        <p class="toggle-link">
            <span id="toggleMsg">New here? <span onclick="toggle()">Create Account</span></span>
        </p>
    </div>

    <script>
        const REDIRECT = "index.html";
        let isLogin = true;

        const email = document.getElementById('email');
        const pass = document.getElementById('password');
        const loader = document.getElementById('loaderPop');
        const lTxt = document.getElementById('loaderTxt');
        const msg = document.getElementById('msg');

        // Auto-fill Remembered Data
        window.onload = () => {
            email.value = localStorage.getItem('lastEmail') || "";
            pass.value = localStorage.getItem('lastPass') || "";
        };

        // Password Toggle
        document.getElementById('eye').onclick = function() {
            const isPass = pass.type === 'password';
            pass.type = isPass ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        };

        function toggle() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('btn').innerText = isLogin ? "Login" : "Create Account";
            document.getElementById('toggleMsg').innerHTML = isLogin ? 
                'New here? <span onclick="toggle()">Create Account</span>' : 
                'Have an account? <span onclick="toggle()">Login</span>';
            msg.style.display = 'none';
        }

        document.getElementById('mainForm').onsubmit = (e) => {
            e.preventDefault();
            loader.style.display = 'flex';
            lTxt.innerText = isLogin ? "Authenticating..." : "Creating your account...";

            const time = isLogin ? 2000 : 6000;

            setTimeout(() => {
                if (!isLogin) {
                    localStorage.setItem('uEmail', email.value);
                    localStorage.setItem('uPass', pass.value);
                    localStorage.setItem('lastEmail', email.value);
                    localStorage.setItem('lastPass', pass.value);
                    loader.style.display = 'none';
                    showMsg("Account Ready! Please Login.", "#4ade80");
                    toggle();
                } else {
                    if (email.value === localStorage.getItem('uEmail') && pass.value === localStorage.getItem('uPass')) {
                        localStorage.setItem('lastEmail', email.value);
                        localStorage.setItem('lastPass', pass.value);
                        lTxt.innerText = "Success! Entering...";
                        setTimeout(() => window.location.href = REDIRECT, 1000);
                    } else {
                        loader.style.display = 'none';
                        showMsg("Invalid Details!", "#f87171");
                    }
                }
            }, time);
        };

        function showMsg(t, c) {
            msg.innerText = t;
            msg.style.display = 'block';
            msg.style.color = c;
            msg.style.border = `1px solid ${c}`;
            msg.style.background = `${c}1A`;
        }
    </script>
</body>
</html>
