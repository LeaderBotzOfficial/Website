    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            background-color: #050a05;
            color: #00ff00;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10001;
        }
        .progress-bar { width: 300px; height: 10px; border: 1px solid #00ff00; margin-top: 20px; }
        #progress { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        /* --- NETWORK OPTIMIZER SCREEN --- */
        #optimizer-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
            color: #00ffff; text-shadow: 0 0 10px #00ffff;
        }
        .opt-box { border: 2px solid #00ffff; padding: 40px; text-align: center; background: rgba(0,10,20,0.9); }

        /* --- MAIN LAYOUT --- */
        .header { text-align: center; font-size: 2.2em; padding: 10px; text-shadow: 0 0 15px #00ff00; border-bottom: 1px solid #003300; }
        .main-container { display: flex; padding: 20px; gap: 20px; height: calc(100vh - 120px); box-sizing: border-box;}
        
        .terminal { flex: 2; border: 1px solid #00ff00; padding: 15px; background: rgba(0, 20, 0, 0.8); overflow-y: hidden; position: relative; }
        .side-terminal { flex: 0.8; border: 1px solid #00ffff; padding: 10px; background: rgba(0, 10, 20, 0.8); font-size: 0.75em; overflow-y: hidden; color: #00ffff; }
        
        .line { margin-bottom: 4px; line-height: 1.2; font-size: 14px; }
        .success { color: #39ff14; } .error { color: #ff073a; } .warning { color: #fafa33; } .info { color: #00ffff; }

        /* --- TELEGRAM POPUP --- */
        #tg-popup {
            position: fixed; bottom: 20px; right: -400px; width: 280px;
            background: #001a1a; border: 2px solid #00ffff; padding: 15px;
            transition: right 0.5s ease-in-out; z-index: 999;
        }
        #tg-popup.show { right: 20px; }

        .spinner {
            width: 40px; height: 40px; border: 4px solid #111;
            border-top: 4px solid #00ffff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

        <div class="progress-bar"><div id="progress"></div></div>

        function runSequences() {
            // Main Terminal Logic
            let m = 0;
            const mInt = setInterval(() => {
                if (m < mainLogs.length) {
                    const d = document.createElement('div');
                    d.className = `line ${mainLogs[m].c}`;
                    d.textContent = mainLogs[m].t;
                    mainTerm.appendChild(d);
                    mainTerm.scrollTop = mainTerm.scrollHeight;
                    m++;
                } else { 
                    clearInterval(mInt); 
                    clearInterval(sInt); // Stop side terminal too
                    showFinalSequence(); 
                }

                if (sideContent.childElementCount > 20) sideContent.removeChild(sideContent.firstChild);

        function showFinalSequence() {
            const popup = document.getElementById('tg-popup');
            popup.classList.add('show');
            setTimeout(() => {

                startOptimizer();

        function startOptimizer() {
            const screen = document.getElementById('optimizer-screen');
            const status = document.getElementById('opt-status');

            const cInt = setInterval(() => {

                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
